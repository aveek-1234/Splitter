name: Deploy to VPS + Worker

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "master"

jobs:
  # -----------------------
  # 🧱 BUILD
  # -----------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            -t myapp .

      - name: Save Docker image
        run: docker save myapp > myapp.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-image
          path: myapp.tar

  # -----------------------
  # 🚀 VPS DEPLOY
  # -----------------------
  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp-image

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "myapp.tar"
          target: "/home/${{ secrets.VPS_USER }}/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}
            docker load < myapp.tar
            docker stop myapp || true
            docker rm myapp || true
            docker run -d -p 3000:3000 \
              -e CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }} \
              -e CLERK_JWT_ISSUER_DOMAIN=${{ secrets.CLERK_JWT_ISSUER_DOMAIN }} \
              -e RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
              -e NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} \
              -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -e INNGEST_EVENT_KEY=${{ secrets.INNGEST_EVENT_KEY }} \
              -e INNGEST_SIGNING_KEY=${{ secrets.INNGEST_SIGNING_KEY }} \
              --name myapp myapp

  # -----------------------
  # 🌍 WORKER DEPLOY
  # -----------------------
  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Worker Dependencies
        working-directory: ./splitterhub-edge-auth
        run: npm install

      - name: Install Wrangler
        working-directory: ./splitterhub-edge-auth
        run: npm install wrangler

      - name: Deploy Worker
        working-directory: ./splitterhub-edge-auth
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    # -----------------------
  # ⚡ CONVEX DEPLOY (PROD)
  # -----------------------
  deploy-convex:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Convex CLI
        run: npm install -g convex

      - name: Deploy Convex to Production
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
