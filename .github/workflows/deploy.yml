name: Deploy to VPS

on:
  pull_request:
    branches:
      - master

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} \
            -t myapp .

      - name: Save Docker image
        run: docker save myapp > myapp.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-image
          path: myapp.tar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # 👇 THIS IS THE MAGIC LINE (approval required)
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp-image

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "myapp.tar"
          target: "/home/${{ secrets.VPS_USER }}/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker load < myapp.tar
            docker stop myapp || true
            docker rm myapp || true
            docker run -d -p 3000:3000 \
              --env-file /home/${{ secrets.VPS_USER }}/.env.production \
              --name myapp myapp